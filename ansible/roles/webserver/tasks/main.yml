---
- name: Installer Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: S'assurer que Nginx est démarré et activé au boot
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

- name: Déployer la page d'accueil NovaSphere (Via Role Template)
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: "0644"
  notify: Redémarrer Nginx
