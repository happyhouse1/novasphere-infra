# inventory/aws_ec2.yml — Inventaire dynamique AWS
---
plugin: amazon.aws.aws_ec2

regions:
  - eu-west-3

filters:
  tag:Project: NovaSphere
  instance-state-name: running

hostnames:
  - ip-address

keyed_groups:
  - key: tags.Environment
    prefix: env
  - key: instance_type
    prefix: type

groups:
  webservers: "'NovaSphere' in tags.Project"
